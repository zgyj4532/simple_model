name: Codex plugin
on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["master"]
permissions:
  contents: read
jobs:
  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y jq zip unzip
      - run: bash tests/test_plugin_package.sh
      - run: bash tools/package_codex_plugin.sh --version 0.6.0
