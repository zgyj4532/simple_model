name: Codex plugin release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Plugin version to validate
        required: true
        default: "0.6.0"

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: sudo apt-get update && sudo apt-get install -y jq zip unzip
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - run: plugins/simple-model-project-intelligence/skills/simple-model-project-intelligence/scripts/simple_model_pi.sh self-release --version "${{ steps.version.outputs.version }}" --dry-run --json | jq -e '.ok == true'
      - run: bash tools/package_codex_plugin.sh --version "${{ steps.version.outputs.version }}" | jq -e '.ok == true and .manifest_sha256'
      - uses: actions/upload-artifact@v4
        with:
          name: simple-model-project-intelligence-plugin-${{ steps.version.outputs.version }}
          path: dist/simple-model-project-intelligence-plugin-${{ steps.version.outputs.version }}.zip
